apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: incident-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: vishal28d/incident-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_INCIDENT_API
              value: "http://incident-service:8082"
            - name: NEXT_PUBLIC_REALTIME_API
              value: "http://realtime-service:8083"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: incident-platform
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
