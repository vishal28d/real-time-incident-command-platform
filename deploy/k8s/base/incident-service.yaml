apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: incident-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-service
  template:
    metadata:
      labels:
        app: incident-service
    spec:
      containers:
        - name: incident-service
          image: ghcr.io/example/incident-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
  namespace: incident-platform
spec:
  selector:
    app: incident-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
