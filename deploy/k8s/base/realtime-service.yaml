apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: incident-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime-service
          image: vishal28d/realtime-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          readinessProbe:
            httpGet:
              path: /api/v1/stream/events
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: incident-platform
spec:
  selector:
    app: realtime-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
