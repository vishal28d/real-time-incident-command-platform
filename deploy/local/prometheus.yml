global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'incident-service'
    static_configs:
      - targets: ['incident-service:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-ui:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']